name: Build Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `npm install` (not `npm ci`): the lockfile is generated on macOS and,
      # due to npm/cli#4828, omits the linux-x64 rollup optional binary. `npm install`
      # reads the committed lock and resolves the platform-appropriate binary on the runner.
      - run: npm install --no-audit --no-fund
      - run: npm run check
